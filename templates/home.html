<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Customer Churn Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: #f4f7fc;
    font-family: "Segoe UI", sans-serif;
}

.main-card{
    background:white;
    padding:30px;
    border-radius:20px;
    margin-top:30px;
    box-shadow:0px 5px 20px rgba(0,0,0,0.1);
}

.page-title{
    text-align:center;
    font-weight:700;
    margin-bottom:10px;
}

.page-subtitle{
    text-align:center;
    color:gray;
    margin-bottom:30px;
}

.form-label{
    font-weight:600;
}

.btn-predict{
    width:100%;
    padding:12px;
    font-size:18px;
    font-weight:600;
}

.result-card{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:#eef5ff;
    border-left:6px solid #0d6efd;
}

.result-title{
    font-weight:700;
    margin-bottom:10px;
}

</style>

</head>

<body>
<h1 style="color:red;text-align:center;">TEST NEW UI LOADE</h1>
<div class="container">

    <div class="main-card">

        <h1 class="page-title">
            Customer Churn Prediction Dashboard
        </h1>

        <p class="page-subtitle">
            Predict whether a telecom customer is likely to churn or continue.
        </p>

        <form action="/" method="POST">

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Senior Citizen</label>
                    <select class="form-select" name="query1">
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Monthly Charges</label>
                    <input type="number" step="0.01" class="form-control" name="query2" value="{{query2}}">
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Total Charges</label>
                    <input type="number" step="0.01" class="form-control" name="query3" value="{{query3}}">
                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" name="query4">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Partner</label>
                    <select class="form-select" name="query5">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Dependents</label>
                    <select class="form-select" name="query6">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Phone Service</label>
                    <select class="form-select" name="query7">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Multiple Lines</label>
                    <select class="form-select" name="query8">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No phone service</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Internet Service</label>
                    <select class="form-select" name="query9">
                        <option>DSL</option>
                        <option>Fiber optic</option>
                        <option>No</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Online Security</label>
                    <select class="form-select" name="query10">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Online Backup</label>
                    <select class="form-select" name="query11">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Device Protection</label>
                    <select class="form-select" name="query12">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Tech Support</label>
                    <select class="form-select" name="query13">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Streaming TV</label>
                    <select class="form-select" name="query14">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Streaming Movies</label>
                    <select class="form-select" name="query15">
                        <option>Yes</option>
                        <option>No</option>
                        <option>No internet service</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Contract</label>
                    <select class="form-select" name="query16">
                        <option>Month-to-month</option>
                        <option>One year</option>
                        <option>Two year</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Paperless Billing</label>
                    <select class="form-select" name="query17">
                        <option>Yes</option>
                        <option>No</option>
                    </select>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Payment Method</label>
                    <select class="form-select" name="query18">
                        <option>Electronic check</option>
                        <option>Mailed check</option>
                        <option>Bank transfer (automatic)</option>
                        <option>Credit card (automatic)</option>
                    </select>
                </div>

            </div>

            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Tenure (Months)</label>
                    <input type="number" class="form-control" name="query19" value="{{query19}}">
                </div>

            </div>

            <button type="submit" class="btn btn-primary btn-predict">
                Predict Customer Churn
            </button>

        </form>

        {% if output1 %}
        <div class="result-card">

            <h4 class="result-title">
                Prediction Result
            </h4>

            <p><strong>{{output1}}</strong></p>

            <p>{{output2}}</p>

        </div>
        {% endif %}

    </div>

</div>

</body>
</html>
